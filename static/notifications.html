<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerOS — Notifications</title>
<style>
:root { --bg-primary:#0f172a; --bg-secondary:#1e293b; --bg-tertiary:#334155; --text-primary:#f8fafc; --text-secondary:#94a3b8; --text-muted:#64748b; --accent-primary:#6366f1; --accent-success:#22c55e; --accent-warning:#f59e0b; --accent-danger:#ef4444; --border-color:#334155; --radius:12px; --shadow:0 4px 6px -1px rgba(0,0,0,0.3); --shadow-lg:0 10px 25px -5px rgba(0,0,0,0.4); --gradient:linear-gradient(135deg,#6366f1,#8b5cf6); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; }
.nav-bar { display:flex; align-items:center; justify-content:space-between; padding:16px 28px; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:100; }
.nav-logo { display:flex; align-items:center; gap:10px; font-size:20px; font-weight:800; color:var(--text-primary); text-decoration:none; }
.nav-logo .logo-icon { width:36px; height:36px; background:var(--gradient); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; color:white; }
.nav-links { display:flex; gap:6px; }
.nav-links a { padding:8px 16px; border-radius:var(--radius); color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; transition:all 0.2s; cursor:pointer; border:none; background:none; font-family:inherit; }
.nav-links a:hover { color:var(--text-primary); background:var(--bg-tertiary); }
.nav-links a.active { color:white; background:var(--gradient); }
.content-area { padding:28px; max-width:800px; margin:0 auto; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.page-header h1 { font-size:24px; font-weight:700; }
.page-header .badge { padding:4px 12px; background:var(--accent-danger); border-radius:20px; font-size:12px; font-weight:600; color:white; }
.filter-tabs { display:flex; gap:8px; margin-bottom:20px; }
.filter-tab { padding:8px 16px; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius); color:var(--text-secondary); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.filter-tab:hover { color:var(--text-primary); }
.filter-tab.active { background:var(--gradient); color:white; border-color:transparent; }
.notification-list { display:flex; flex-direction:column; gap:8px; }
.notification-item { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius); padding:16px; display:flex; gap:14px; transition:all 0.2s; cursor:pointer; }
.notification-item:hover { border-color:var(--accent-primary); }
.notification-item.unread { border-left:3px solid var(--accent-primary); background:rgba(99,102,241,0.05); }
.notification-item .icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.notification-item .icon.job { background:rgba(99,102,241,0.15); }
.notification-item .icon.interview { background:rgba(59,130,246,0.15); }
.notification-item .icon.offer { background:rgba(34,197,94,0.15); }
.notification-item .icon.referral { background:rgba(139,92,246,0.15); }
.notification-item .icon.system { background:rgba(100,116,139,0.15); }
.notification-item .content { flex:1; }
.notification-item .content h4 { font-size:14px; font-weight:600; margin-bottom:2px; }
.notification-item .content p { font-size:13px; color:var(--text-secondary); line-height:1.5; }
.notification-item .meta { display:flex; align-items:center; gap:12px; margin-top:6px; }
.notification-item .meta .time { font-size:11px; color:var(--text-muted); }
.notification-item .meta .unread-dot { width:8px; height:8px; background:var(--accent-primary); border-radius:50%; }
.notification-item .actions { display:flex; align-items:center; gap:8px; }
.notification-item .actions button { background:none; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; transition:color 0.2s; padding:4px; }
.notification-item .actions button:hover { color:var(--accent-primary); }
.empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.empty-state h3 { font-size:16px; color:var(--text-secondary); margin-bottom:8px; }
.toast-container { position:fixed; top:24px; right:24px; z-index:1000; display:flex; flex-direction:column; gap:10px; }
.toast { padding:14px 20px; border-radius:var(--radius); font-size:14px; font-weight:500; display:flex; align-items:center; gap:10px; animation:slideIn 0.3s ease; max-width:400px; box-shadow:var(--shadow-lg); }
.toast.success { background:var(--accent-success); color:white; }
.toast.info { background:var(--accent-primary); color:white; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
@media(max-width:768px){ .nav-links { display:none; } .content-area { padding:16px; } }
</style>
</head>
<body>
<nav class="nav-bar">
<a href="index.html" class="nav-logo"><div class="logo-icon">C</div>CareerOS</a>
<div class="nav-links">
<a href="jobs.html">Jobs</a>
<a href="applications.html">Applications</a>
<a href="notifications.html" class="active">Notifications</a>
<a href="settings.html">Settings</a>
</div>
</nav>
<div class="content-area">
<div class="page-header">
<h1>🔔 Notifications</h1>
<button class="btn btn-secondary" onclick="markAllRead()" style="padding:8px 16px; background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:var(--radius); color:var(--text-primary); font-size:13px; font-weight:600; cursor:pointer;">Mark All Read</button>
</div>
<div class="filter-tabs">
<button class="filter-tab active" onclick="filterNotifications('all')">All</button>
<button class="filter-tab" onclick="filterNotifications('job')">Jobs</button>
<button class="filter-tab" onclick="filterNotifications('interview')">Interviews</button>
<button class="filter-tab" onclick="filterNotifications('offer')">Offers</button>
<button class="filter-tab" onclick="filterNotifications('referral')">Referrals</button>
</div>
<div class="notification-list" id="notificationList"></div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
const NOTIFICATIONS = [
{ id: 1, type: 'job', icon: '💼', title: 'New Job Match', message: 'Google India is hiring a Senior Software Engineer that matches your profile. 95% match score.', time: '2 min ago', unread: true },
{ id: 2, type: 'interview', icon: '🎤', title: 'Interview Scheduled', message: 'Your technical interview with Flipkart is scheduled for July 5, 2026 at 2:00 PM IST.', time: '1 hour ago', unread: true },
{ id: 3, type: 'offer', icon: '🎉', title: 'Offer Received!', message: 'Congratulations! Zomato has extended an offer for UX Designer position. Review details in your applications.', time: '3 hours ago', unread: true },
{ id: 4, type: 'referral', icon: '🎁', title: 'Referral Converted', message: 'Your friend Priya Sharma just signed up! You earned 100 XP (₹1,000 credit).', time: '5 hours ago', unread: false },
{ id: 5, type: 'job', icon: '💼', title: 'Application Viewed', message: 'Razorpay viewed your application for Backend Engineer. This is a good sign!', time: '1 day ago', unread: false },
{ id: 6, type: 'system', icon: '⚙️', title: 'Profile Update Recommended', message: 'Your resume score dropped to 72. Update your skills section to improve matching.', time: '2 days ago', unread: false },
{ id: 7, type: 'interview', icon: '🎤', title: 'Interview Prep Reminder', message: 'Your interview with PhonePe is in 24 hours. Complete the system design prep module.', time: '2 days ago', unread: false },
{ id: 8, type: 'referral', icon: '🎁', title: 'New Referral Signup', message: 'Vikram Rao signed up using your link. They completed onboarding.', time: '3 days ago', unread: false }
];

function renderNotifications(filter = 'all') {
  const list = document.getElementById('notificationList');
  const filtered = filter === 'all' ? NOTIFICATIONS : NOTIFICATIONS.filter(n => n.type === filter);
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><h3>No notifications</h3><p>You\'re all caught up!</p></div>';
    return;
  }
  
  list.innerHTML = filtered.map(n => `
    <div class="notification-item ${n.unread ? 'unread' : ''}" data-id="${n.id}">
      <div class="icon ${n.type}">${n.icon}</div>
      <div class="content">
        <h4>${n.title}</h4>
        <p>${n.message}</p>
        <div class="meta">
          <span class="time">${n.time}</span>
          ${n.unread ? '<span class="unread-dot"></span>' : ''}
        </div>
      </div>
      <div class="actions">
        ${n.unread ? '<button onclick="markRead(' + n.id + ')" title="Mark as read">✓</button>' : ''}
        <button onclick="deleteNotification(' + n.id + ')" title="Dismiss">✕</button>
      </div>
    </div>
  `).join('');
  
  updateBadge();
}

function filterNotifications(type) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderNotifications(type);
}

function markRead(id) {
  const n = NOTIFICATIONS.find(x => x.id === id);
  if (n) { n.unread = false; renderNotifications(); showToast('Marked as read', 'success'); }
}

function markAllRead() {
  NOTIFICATIONS.forEach(n => n.unread = false);
  renderNotifications();
  showToast('All notifications marked as read', 'success');
}

function deleteNotification(id) {
  const idx = NOTIFICATIONS.findIndex(x => x.id === id);
  if (idx > -1) { NOTIFICATIONS.splice(idx, 1); renderNotifications(); showToast('Notification dismissed', 'info'); }
}

function updateBadge() {
  const unread = NOTIFICATIONS.filter(n => n.unread).length;
  const badge = document.querySelector('.page-header .badge');
  if (badge) badge.textContent = unread + ' unread';
}

function showToast(m, t = 'info') {
  const c = document.getElementById('toastContainer');
  const d = document.createElement('div'); d.className = 'toast ' + t;
  const i = { success: '✅', error: '❌', info: 'ℹ️' };
  d.innerHTML = (i[t] || 'ℹ️') + ' ' + m; c.appendChild(d); setTimeout(() => d.remove(), 5000);
}

renderNotifications();
</script>
</body>
</html>
