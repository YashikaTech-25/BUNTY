<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerOS — Page Not Found</title>
<style>
:root { --bg-primary:#0f172a; --bg-secondary:#1e293b; --text-primary:#f8fafc; --text-secondary:#94a3b8; --text-muted:#64748b; --accent-primary:#6366f1; --accent-secondary:#8b5cf6; --border-color:#334155; --radius:12px; --gradient:linear-gradient(135deg,#6366f1,#8b5cf6); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; }
.error-container { max-width:500px; }
.error-code { font-size:120px; font-weight:800; line-height:1; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-4px; margin-bottom:8px; }
.error-title { font-size:24px; font-weight:700; margin-bottom:12px; }
.error-desc { font-size:15px; color:var(--text-secondary); margin-bottom:28px; line-height:1.6; }
.btn { padding:12px 24px; border:none; border-radius:var(--radius); font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; text-decoration:none; }
.btn-primary { background:var(--gradient); color:white; }
.btn-secondary { background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); margin-left:12px; }
</style>
</head>
<body>
<div class="error-container">
<div class="error-code">404</div>
<h1 class="error-title">Page Not Found</h1>
<p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
<div>
<a href="index.html" class="btn btn-primary">← Go Home</a>
<a href="jobs.html" class="btn btn-secondary">🔍 Browse Jobs</a>
</div>
</div>
</body>
</html>
